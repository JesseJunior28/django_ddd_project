services:
  db:
    image: postgres:16-alpine
    container_name: django_ddd_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-django_ddd}
      POSTGRES_USER: ${DB_USER:-django_ddd}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-django_ddd}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-django_ddd}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: django_ddd_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-django_ddd}
      DB_USER: ${DB_USER:-django_ddd}
      DB_PASSWORD: ${DB_PASSWORD:-django_ddd}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
